services:
  mongo:
    image: mongo:7
    container_name: orderly-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orderly-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override local host value when backend runs in Docker.
      MONGO_URL: mongodb://mongo:27017
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
